# NOTE: The 'deprecationDate' and 'lifecycle' fields in this spec file are for REFERENCE ONLY.
# They do NOT flow to the API response at runtime. The runtime source of truth for model
# deprecation/lifecycle data is the Helm model-metadata.yaml ConfigMap, which populates
# the DeprecationInfo and Lifecycle fields in the API response via enrichWithMetadata().
# See: distribution/genai-hub-service-helm/src/main/helm/templates/model-metadata.yaml
infrastructure: azure
provider: azure
creator: openai
metadata:
  description: "OpenAI GPT-4o model family"
  documentation: "https://platform.openai.com/docs/models/gpt-4o"
models:
  - name: gpt-4o
    version: "2024-11-20"
    label: "GPT-4o"
    id: openai.gpt-4o-2024-11-20
    functionalCapabilities: ["chat_completion"]
    endpoints:
      - path: "/chat/completions"
      - path: "/v1/responses"
    capabilities:
      features: ["streaming", "functionCalling", "parallelFunctionCalling", "toolCalling", "parallelToolCalling", "jsonMode", "structuredOutput"]
      inputModalities: ["text", "image"]
      outputModalities: ["text"]
      mimeTypes: ["image/png", "image/jpeg", "image/gif", "image/webp"]
    parameters:
      maxInputTokens:
        title: "Max Input Tokens"
        description: "Maximum number of tokens (words or subwords) for input"
        type: "integer"
        maximum: 128000
        required: false
      maxOutputTokens:
        title: "Max Output Tokens"
        description: "Maximum number of tokens to generate"
        type: "integer"
        default: null
        maximum: 16384
        required: false
      temperature:
        title: "Temperature"
        description: "Controls randomness of the generated output"
        type: "float"
        default: 1.0
        maximum: 2.0
        minimum: 0.0
        required: false
      topP:
        title: "Top P"
        description: "Nucleus sampling parameter controlling diversity of the output"
        type: "float"
        default: null
        minimum: 0.0
        maximum: 1.0
        required: false
  - name: gpt-4o
    version: "2024-08-06"
    label: "GPT-4o"
    id: openai.gpt-4o-2024-08-06
    functionalCapabilities: ["chat_completion"]
    deprecationDate: '2026-02-27'
    endpoints:
      - path: "/chat/completions"
      - path: "/v1/responses"
    capabilities:
      features: ["streaming", "functionCalling", "parallelFunctionCalling", "toolCalling", "parallelToolCalling", "jsonMode", "structuredOutput"]
      inputModalities: ["text", "image", "audio"]
      outputModalities: ["text", "audio"]
      mimeTypes: ["image/png", "image/jpeg", "image/gif", "image/webp"]
    parameters:
      maxInputTokens:
        title: "Max Input Tokens"
        description: "Maximum number of tokens (words or subwords) for input"
        type: "integer"
        maximum: 128000
        required: false
      maxOutputTokens:
        title: "Max Output Tokens"
        description: "Maximum number of tokens to generate"
        type: "integer"
        default: null
        maximum: 16384
        required: false
      temperature:
        title: "Temperature"
        description: "Controls randomness of the generated output"
        type: "float"
        default: null
        maximum: 2.0
        minimum: 0.0
        required: false
      topP:
        title: "Top P"
        description: "Nucleus sampling parameter controlling diversity of the output"
        type: "float"
        default: null
        minimum: 0.0
        maximum: 1.0
        required: false
      stopSequences:
        title: "Stop Sequences"
        description: "Allows to define sequences causing model to terminate generation"
        type: "array"
        items:
          type: "string"
        default: null
        required: false
