# See https://golangci-lint.run/usage/configuration/

# Golangci-lint configuration (v2+ format)
version: "2"
linters:
  enable:
    - govet              # Go's vet tool for detecting suspicious constructs
    - errcheck           # Check for unchecked errors
    - staticcheck        # Advanced static analysis (includes checks from vet, gosimple, etc.)
    - unused             # Checks for unused variables, constants, functions, etc.
    - ineffassign        # Detects ineffectual assignments
    - misspell           # Detects commonly misspelled words
    - revive             # Style guide enforcement (configurable)
    - nakedret           # Finds naked returns in functions > 2 lines
    - gocritic           # Detects code smells and style issues
formatters:
  enable:
    - gofmt
    - goimports
issues:
  max-issues-per-linter: 50   # Limit number of issues per linter
  max-same-issues: 3          # Limit repeated issues

output:
  formats:
    text:
      colors: true
      print-issued-lines: true
      print-linter-name: true
run:
  timeout: 10m
  modules-download-mode: vendor
  issues-exit-code: 0 # Do not block the merge
  go: "1.25"
  tests: false  # Include test files or not (set to false) - check this setting again after tests rewrite

severity:
  default: info
  rules:
  - linters:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - revive
    - nakedret
    - gocritic
    severity: info

