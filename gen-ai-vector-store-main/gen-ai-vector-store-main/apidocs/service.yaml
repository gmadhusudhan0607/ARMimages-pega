    get:
      tags:
        - /v2 - Documents (URL-encoded IDs)
      summary: Get document chunks URL-encoded ID
      description: Retrieve document chunks by document URL-encoded ID.
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionID
          in: path
          description: >
            URL-encoded collection ID. Must be percent-encoded.
            Example: "Collection #1 / March 3036" -> "Collection%20%231%20%2F%20March%203036"
          required: true
          schema:
            type: string
            example: "Tom%20&%20Jerry%20and%20Friends%20%2F%20Contract"
          example: "Collection-1"
        - name: documentID
          in: path
          description: >
            URL-encoded document ID. Must be percent-encoded.
            Example: "Tom & Jerry" -> "Tom%20&%20Jerry"
          example: "Tom%20&%20Jerry"
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: >
            Cursor to fetch results after this ID. Cursor must be URL-encoded.
            Example: "DOC-1-EMB-123" will return results after this ID (124,125...).
          example: "DOC-1-EMB-123"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
