  - name: gemini-2.5-flash-image
    version: '001'
    label: Gemini 2.5 Flash Image
    functionalCapabilities: ["image"]
    endpoints:
      - path: /generateContent
    capabilities:
      features: [promptCaching]
      inputModalities: [text, image]
      outputModalities: [text, image]
      mimeTypes:
        - text/plain
        - image/png
        - image/jpeg
        - image/webp
        - image/heic
        - image/heif
    parameters:
      maxInputTokens:
        title: Max Input Tokens
        description: Maximum number of tokens (words or subwords) for input
        type: integer
        maximum: 65536
        required: false
      maxOutputTokens:
        title: Max Output Tokens
        description: Maximum number of tokens to generate (1,290 tokens per generated image)
        type: integer
        default: null
        maximum: 32768
        required: false
      temperature:
        title: Temperature
        description: Controls randomness of the generated output
        type: float
        default: 1.0
