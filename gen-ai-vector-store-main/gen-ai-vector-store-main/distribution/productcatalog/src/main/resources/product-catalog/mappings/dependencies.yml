# All the cross GUID dependencies applicable for the sample product
- productId: FnXCluster
  productCatalogName: fnx-cloud-infrastructure-product-catalog
  version: 1.64+
  resourceGuid: "!e fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))"
- productId: GenAIGatewayServiceProduct
  productCatalogName: genai-gateway-service-product
  version: 1.34+
  resourceGuid: "!e cmdbService.findBackingServiceInCluster(fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID')), 'type=GenAI Gateway Service Product').findResourceGUID()"
