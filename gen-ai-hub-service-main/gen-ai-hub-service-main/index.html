<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>GenAI Hub Service Swagger UI</title>
    <script
        src="https://unpkg.com/swagger-ui-dist@5.32.4/swagger-ui-bundle.js"
        integrity="sha384-FgJpbEfGqpFeiFJh0+HNvyohx84XMd+IwgPyxJxjuDFMHVYmoFqrDEJNrVFexwA0"
        crossorigin="anonymous"></script>
    <script
        src="https://unpkg.com/swagger-ui-dist@5.32.4/swagger-ui-standalone-preset.js"
        integrity="sha384-49fpFaVrAWI/qdgl9Vv5E/4NXxRUiJX5vGuLws1NUpTWGtEqzWEx8gHTw2UTehFK"
        crossorigin="anonymous"></script>
    <link
        rel="stylesheet"
        type="text/css"
        href="https://unpkg.com/swagger-ui-dist@5.32.4/swagger-ui.css"
        integrity="sha384-AHNbXeU7DPcgcihnwKYc3FOT0hTfhEwVFc2JRxxF5S/mplUdt/7G1g6nIblzENrX"
        crossorigin="anonymous" />
    <link
        rel="stylesheet"
        type="text/css"
        href="https://unpkg.com/swagger-ui-themes@3.0.0/themes/3.x/theme-flattop.css"
        integrity="sha384-mf1n1P2f8UQjzWa8vdKPq89DAkqYFajIvz5rVOoNYzp73zfEfRa7rEM0qJcW++hb"
        crossorigin="anonymous" />
</head>
<body>
    <div id="swagger-ui"></div>
    <script>
        window.onload = function() {
            const ui = SwaggerUIBundle({
                url: "spec.yaml",
                dom_id: "#swagger-ui",
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                validatorUrl: null,
                deepLinking: true,
                showExtensions: true
            });
            window.ui = ui;
        };
    </script>
</body>
</html>
