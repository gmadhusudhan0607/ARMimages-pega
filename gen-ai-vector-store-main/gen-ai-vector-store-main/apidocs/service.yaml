openapi: 3.0.2
info:
  title: Vector Store API
  contact:
    email: Jarvis@pega.com
  version: 2.0.0
servers:
  - url: /

paths:
  #  Documents
  /v1/{isolationID}/collections/{collectionName}/documents:
    put:
      tags:
        - Documents
      summary: Upsert document
      description: Upsert one document.
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The index/collection name.
          required: true
          schema:
            type: string
        - name: consistencyLevel
          in: query
          description:
            "consistency level can be strong (synchronous) or eventual (asynchronous),\
            \ by default is eventual"
          schema:
            type: string
      requestBody:
        description: Document to be upserted.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutDocumentRequest"
        required: true
      responses:
        "201":
          description: Document upserted successfully.
          content: {}
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
            X-Genai-Vectorstore-Model-Id:
              $ref: "#/components/headers/X-Genai-Vectorstore-Model-Id"
            X-Genai-Vectorstore-Model-Version:
              $ref: "#/components/headers/X-Genai-Vectorstore-Model-Version"
            X-Genai-Vectorstore-Embedding-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Time-Ms"
            X-Genai-Vectorstore-Embedding-Calls-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Calls-Count"
        "202":
          description: Document accepted successfully.
          content: {}
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "504":
          description: Request timeout exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []
      x-codegen-request-body-name: document
    post:
      tags:
        - Documents
      summary: List documents statuses
      description: List documents statuses
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The collection/index name.
          required: true
          schema:
            type: string
        - name: status
          in: query
          description: filter by status
          schema:
            type: string
            enum:
              - COMPLETED
              - IN_PROGRESS
              - ERROR
      requestBody:
        description: Attributes to filter.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/FiltersArray"
        required: false
      responses:
        "200":
          description: List documents successful.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentStatus"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
            X-Genai-Vectorstore-Response-Returned-Items-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Response-Returned-Items-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "504":
          description: Request timeout exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []
      x-codegen-request-body-name: filters
    delete:
      tags:
        - Documents
      summary: Delete documents by filter
      description: Delete document based on the filter attributes
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The index name.
          required: true
          schema:
            type: string
      requestBody:
        description: Attributes to filter.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/FiltersArray"
        required: true
      responses:
        "200":
          description: N documents deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedDocuments"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "504":
          description: Request timeout exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []
      x-codegen-request-body-name: filters
  /v1/{isolationID}/collections/{collectionName}/documents/{documentID}:
    get:
      tags:
        - Documents
      summary: Get document status details
      description: Patch document attributes based on the document Id
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The index name.
          required: true
          schema:
            type: string
        - name: documentID
          in: path
          description: The id of the document to delete. Example `DOC-1`.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStatus"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
            X-Genai-Vectorstore-Response-Returned-Items-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Response-Returned-Items-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "504":
          description: Request timeout exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []
    delete:
      tags:
        - Documents
      summary: Delete document
      description: Delete document based on the document ID
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The index name.
          required: true
          schema:
            type: string
        - name: documentID
          in: path
          description: The id of the document to delete. Example `DOC-1`.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedDocuments"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "504":
          description: Request timeout exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []
    patch:
      tags:
        - Documents
      summary: Patch document attributes or status
      description: Patch document attributes or status based on the document Id. At least one of attributes or status must be provided.
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The index name.
          required: true
          schema:
            type: string
        - name: documentID
          in: path
          description: The id of the document to patch. Example `DOC-1`.
          required: true
          schema:
            type: string
      requestBody:
        description: Document attributes or status to be updated. At least one field must be provided.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchDocumentRequest"
        required: true
      responses:
        "200":
          description: Document patched successfully.
          content: {}
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "404":
          description: Document not found.
          content: {}
        "504":
          description: Request timeout exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []
      x-codegen-request-body-name: document

  #  /file
  /v1/{isolationID}/collections/{collectionName}/file:
    put:
      tags:
        - Documents
      summary: Create document (upload file)
      description: >
        Upload one document (file) for async processing via Smart Chunking.
        The file is forwarded to the Smart Chunking service for extraction and chunking. Smart Chunking then calls back Vector Store for indexing.
        Returns 202 Accepted immediately. Processing happens asynchronously.
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The collection identifier (name).
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PutDocumentFileRequest"
            encoding:
              documentAttributes:
                contentType: application/json
              documentMetadata:
                contentType: application/json
        required: true
      responses:
        "202":
          description: >
            Accepted. File forwarded to Smart Chunking service for async processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileSubmissionResponse"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
        "400":
          description: Bad Request. Invalid request parameters.
          content: {}
        "401":
          description: Unauthorized. Authentication required.
          content: {}
        "500":
          description: Internal Server Error. Server encountered an error.
          content: {}
        "502":
          description: Bad Gateway. Smart Chunking service is unavailable.
          content: {}
      security:
        - Bearer: []
      x-codegen-request-body-name: request
  "/v1/{isolationID}/collections/{collectionName}/file/text":
    put:
      tags:
        - Documents
      summary: Create document (plaintext file)
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The collection identifier (name).
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutDocumentPlainTextRequest"
      responses:
        "202":
          description: >
            Accepted. Text content forwarded to Smart Chunking service for async processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileSubmissionResponse"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
        "400":
          description: Bad Request. Invalid request parameters.
          content: {}
        "401":
          description: Unauthorized. Authentication required.
          content: {}
        "500":
          description: Internal Server Error. Server encountered an error.
          content: {}
        "502":
          description: Bad Gateway. Smart Chunking service is unavailable.
          content: {}
      security:
        - Bearer: []

  #  /document/delete
  /v1/{isolationID}/collections/{collectionName}/document/delete-by-id:
    post:
      tags:
        - Documents
      summary: Delete document by ID
      description: Delete document by document ID
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The collection/index name.
          required: true
          schema:
            type: string
      requestBody:
        description: Delete request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentDeleteByIdRequest"

        required: true
      responses:
        "200":
          description: Document deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedDocuments"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "504":
          description: Request timeout exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []

  # Query
  /v1/{isolationID}/collections/{collectionName}/query/chunks:
    post:
      tags:
        - Query
      summary: Retrieve query chunks
      description: Retrieve chunks based on a query.
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The index/collection name.
          required: true
          schema:
            type: string
        - name: retrieveVector
          in: query
          description:
            "retrieveVector can be false/true, indicates if in response vector\
            \ should be included"
          schema:
            type: boolean
      requestBody:
        description: The query parameters.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryChunksRequest"
        required: true
      responses:
        "200":
          description: Chunks retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueryChunksResponse"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
            X-Genai-Vectorstore-Model-Id:
              $ref: "#/components/headers/X-Genai-Vectorstore-Model-Id"
            X-Genai-Vectorstore-Model-Version:
              $ref: "#/components/headers/X-Genai-Vectorstore-Model-Version"
            X-Genai-Vectorstore-Embedding-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Time-Ms"
            X-Genai-Vectorstore-Embedding-Calls-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Calls-Count"
            X-Genai-Vectorstore-Response-Returned-Items-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Response-Returned-Items-Count"
            X-Genai-Vectorstore-Embedding-Retry-Count:
                $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Retry-Count"
            X-Genai-Vectorstore-Processing-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Processing-Duration-Ms"
            X-Genai-Vectorstore-Overhead-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Overhead-Ms"
            X-Genai-Vectorstore-Embedding-Net-Overhead-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Net-Overhead-Ms"
            X-Genai-Gateway-Response-Time-Ms:
              $ref: "#/components/headers/X-Genai-Gateway-Response-Time-Ms"
            X-Genai-Gateway-Input-Tokens:
              $ref: "#/components/headers/X-Genai-Gateway-Input-Tokens"
            X-Genai-Gateway-Output-Tokens:
              $ref: "#/components/headers/X-Genai-Gateway-Output-Tokens"
            X-Genai-Gateway-Tokens-Per-Second:
              $ref: "#/components/headers/X-Genai-Gateway-Tokens-Per-Second"
            X-Genai-Gateway-Model-Id:
              $ref: "#/components/headers/X-Genai-Gateway-Model-Id"
            X-Genai-Gateway-Region:
              $ref: "#/components/headers/X-Genai-Gateway-Region"
            X-Genai-Gateway-Retry-Count:
              $ref: "#/components/headers/X-Genai-Gateway-Retry-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "502":
          description: Failed to reach LLM or Database.
          content:
            application/json:
              example:
                code: "502"
                message: "LLM Response timeout. Failed to get embedding for question during 3000 millisecond. Max retries (2) reached"
        "504":
          description: Gateway Timeout - Query embedding timeout after max retries exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []
      x-codegen-request-body-name: query
  /v1/{isolationID}/collections/{collectionName}/query/documents:
    post:
      tags:
        - Query
      summary: Retrieve documents by query
      description: Retrieve document ids based on a query.
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The index/collection name.
          required: true
          schema:
            type: string
      requestBody:
        description: The query parameters.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryDocumentsRequest"
        required: true
      responses:
        "200":
          description: Documents retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueryDocumentsResponse"
          headers:
            X-Genai-Vectorstore-Request-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Request-Duration-Ms"
            X-Genai-Vectorstore-Db-Query-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Db-Query-Time-Ms"
            X-Genai-Vectorstore-Documents-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Documents-Count"
            X-Genai-Vectorstore-Vectors-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Vectors-Count"
            X-Genai-Vectorstore-Model-Id:
              $ref: "#/components/headers/X-Genai-Vectorstore-Model-Id"
            X-Genai-Vectorstore-Model-Version:
              $ref: "#/components/headers/X-Genai-Vectorstore-Model-Version"
            X-Genai-Vectorstore-Embedding-Time-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Time-Ms"
            X-Genai-Vectorstore-Embedding-Calls-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Calls-Count"
            X-Genai-Vectorstore-Response-Returned-Items-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Response-Returned-Items-Count"
            X-Genai-Vectorstore-Embedding-Retry-Count:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Retry-Count"
            X-Genai-Vectorstore-Processing-Duration-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Processing-Duration-Ms"
            X-Genai-Vectorstore-Overhead-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Overhead-Ms"
            X-Genai-Vectorstore-Embedding-Net-Overhead-Ms:
              $ref: "#/components/headers/X-Genai-Vectorstore-Embedding-Net-Overhead-Ms"
            X-Genai-Gateway-Response-Time-Ms:
              $ref: "#/components/headers/X-Genai-Gateway-Response-Time-Ms"
            X-Genai-Gateway-Input-Tokens:
              $ref: "#/components/headers/X-Genai-Gateway-Input-Tokens"
            X-Genai-Gateway-Output-Tokens:
              $ref: "#/components/headers/X-Genai-Gateway-Output-Tokens"
            X-Genai-Gateway-Tokens-Per-Second:
              $ref: "#/components/headers/X-Genai-Gateway-Tokens-Per-Second"
            X-Genai-Gateway-Model-Id:
              $ref: "#/components/headers/X-Genai-Gateway-Model-Id"
            X-Genai-Gateway-Region:
              $ref: "#/components/headers/X-Genai-Gateway-Region"
            X-Genai-Gateway-Retry-Count:
              $ref: "#/components/headers/X-Genai-Gateway-Retry-Count"
        "400":
          description: Bad request. Invalid input.
          content: {}
        "502":
          description: Failed to reach LLM or Database.
          content:
            application/json:
              example:
                code: "502"
                message: "LLM Response timeout. Failed to get embedding for question during 3000 millisecond. Max retries (2) reached"
        "504":
          description: Gateway Timeout - Query embedding timeout after max retries exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeoutError"
      security:
        - Bearer: []
      x-codegen-request-body-name: query

  #  Attributes
  /v1/{isolationID}/collections/{collectionName}/attributes:
    post:
      tags:
        - Attributes
      summary: List available attributes
      description: List available attributes for the specifix isolation and index.
      parameters:
        - name: isolationID
          in: path
          description: The isolation identifier.
          required: true
          schema:
            type: string
        - name: collectionName
          in: path
          description: The index/collection name.
          required: true
          schema:
            type: string
      requestBody:
        description: The attributes filters.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrieveAttributesRequest"
        required: true
      responses:
        "200":
          description: Chunks retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
