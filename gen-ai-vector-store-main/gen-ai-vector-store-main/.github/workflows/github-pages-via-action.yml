name: Enable Swagger UI via Github Pages 

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apidocs/**'
      - '_config.yml'
      - 'index.html'
      - '.github/workflows/github-pages-via-action.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: runner-2-core-4gi
    permissions:
      id-token: write
      contents: read
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      - name: Build site
        run: |
          bundle exec jekyll build --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        env:
          GITHUB_PAGES: true
