id: GenAIVectorStoreTestControlplane
name: GenAIVectorStoreTestControlplane
version: @version@
description: Deploys Test SAX client for GenAIVectorStoreOps service

dependencies:
  {{>dependencies.yml}}

mappings:
  services_versions:
    {{>services_versions.yml}}

prompts:
  - name: Owner
    description: Owner of the deployment (for tagging purpose)
    constraints:
      required: true
    uicontrols:
      type: text
  - name: Name
    description: Environment name
    dependsOn: prompts.Owner
    defaultValue: !e ('genai-vector-store-test-controlplane--' + prompts.Owner.toLowerCase() + '-' + fn.randomString().length(6).generate().toLowerCase())
    constraints:
      required: true
      minLength: 10
    uicontrols:
      type: text
  - name: ClusterGUID
    description: The guid of the CloudK cluster in which MongoDB cluster will be deployed
    constraints:
      allowedPattern: (\w{8}-\w{4}-\w{4}-\w{4}-\w{12})
      required: true
    uicontrols:
      type: text

node:
  path: !e '"/backing-services/${fn.generateGUID()}"'
  labels:
    name: !e fn.select("", prompts.Name)
    type: GenAIVectorStoreTestControlplane
    clusterguid: !e fn.select("", prompts.ClusterGUID)
    owner: "JarvisTeam"
    accountid: !e cmdbService.cluster(fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))).get('AccountID')
    region: !e cmdbService.cluster(fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))).get('Region')
    provider: !e cmdbService.cluster(fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))).labels().get('provider')
    pega-service-id: @pegaServiceId@
    pega-service-name: @pegaServiceName@
    pega-product-id: PRD-7724
    environmenttype: "Dev"
  services:
    - name: ServiceAuthenticationClientService
      version: !e fn.lookup('services_versions', 'ServiceAuthenticationClientService')
      namespace: "ops-service"
      parameters:
        - name: Owner
          value: !e prompts.Owner
        - name: ClusterGUID
          value: !e prompts.ClusterGUID
        - name: ServiceType
          value: cp-services
        - name: AllowedScopes
          value: "genai-vector-store-ops:isolations.read genai-vector-store-ops:isolations.write"
  nodes: []
  