data:
  model-metadata.yaml: |
    claude-3-haiku:
      provider: bedrock
      creator: anthropic
      model_name: Claude-3-Haiku
      model_description: Claude3 Chat Completions model
      model_mapping_id: claude-3-haiku
      version: 3
      model_label: Claude 3 Haiku
      type: chat_completion
      input_tokens: 200000
      model_capabilities:
        features:
          - streaming
          - functionCalling
          - jsonMode
        input_modalities:
          - text
          - image
        output_modalities:
          - text
          - chat
        mime_types:
          - image/jpeg
          - image/png
          - image/gif
          - image/webp
          - application/pdf
          - application/docx
          - text/csv
          - application/doc
          - application/xls
          - application/xlsx
          - text/html
          - text/plain
          - text/markdown
      parameters:
        max_tokens:
          title: Max Output Tokens
          description: Maximum number of tokens to generate
          type: integer
          default: 4096
          maximum: 4096
          required: false
        temperature:
          title: Temperature
          description: Controls randomness of the generated output
          type: float
          default: 0.7
          maximum: 1.0
          minimum: 0.0
          required: false
        top_p:
          title: Top P
          description: Nucleus sampling parameter controlling diversity of the output.
          type: float
          default: 1.0
          minimum: 0.0
          maximum: 1.0
          required: false
        stop:
          title: Stop Sequences
          description: Allows to define sequences causing model to terminate generation
          type: string
          default: null
          required: false
      alternate_model_info:
        name: claude-haiku-4-5
        provider: bedrock
        creator: anthropic
      deprecation_date: '2026-09-09'
