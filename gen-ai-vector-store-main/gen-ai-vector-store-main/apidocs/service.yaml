components:
  schemas:
    Pagination:
      type: object
      properties:
        nextCursor:
          type: string
          description: NextCursor is the cursor to fetch the next page of data. Cursor nust be URL-encoded.
          example: "DOC-1-EMB-123"
        limit:
          type: number
          description: Limit of items returned per page.
        itemsTotal:
          type: number
          description: Total number of items.
      required:
        - limit
        - itemsTotal
    Collections:
      type: object
      properties:
        isolationID:
          type: string
          description: isolation identifier
          example: isolation-1
        collections:
          type: array
          items:
            $ref: "#/components/schemas/Collection"
      required:
        - collections
    Collection:
      type: object
      properties:
        collectionID:
          type: string
          description: Collection ID
          example: "Collection #1 / March 3036"
        defaultEmbeddingProfile:
          type: string
          description: Default embedding profile
          example: "openai-text-embedding-ada-002"
        documentsTotal:
          type: integer
          description: Total number of documents in the collection
          example: 1000
      required:
        - collectionID
    CollectionCreate:
      type: object
      properties:
        collectionID:
          type: string
          description: Collection ID
          example: "Collection #1 / March 3036"
      required:
        - collectionID
    PutDocumentRequest:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the document.
          example: DOC-1
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/Chunk"
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
        metadata:
          $ref: "#/components/schemas/Metadata"
    PatchDocumentRequest:
      type: object
      properties:
        attributes:
          type: array
          description: Array of attributes to update. Optional if status is provided.
          items:
            $ref: "#/components/schemas/Attribute"
        status:
          type: string
          description: Document status to update. Optional if attributes is provided. Must be one of COMPLETED, IN_PROGRESS, or ERROR.
          example: "COMPLETED"
          enum:
            - COMPLETED
            - IN_PROGRESS
            - ERROR
        errorMessage:
          type: string
          description: Optional error message. Applicable when status is ERROR.
          example: "Chunking failed: unsupported file format"
    DocumentStatus:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the document.
          example: DOC-1
        status:
          type: string
          example: IN_PROGRESS
        error:
          type: string
          example: ""
    DocumentChunks:
      type: object
      properties:
        documentID:
          type: string
          description: The unique identifier of the document.
          example: DOC-1
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/DocumentChunk"
    DocumentChunk:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the document.
          example: DOC-1
        content:
          type: string
          example: "chunk content here"
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
    Chunk:
      type: object
      properties:
        content:
          type: string
          description: The content of the chunk.
          example:
            "A report definition is a tool used in database interactions, specifically\
            \ for retrieving required details or information based on certain conditions."
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
        metadata:
          $ref: "#/components/schemas/Metadata"
    Attribute:
      type: object
      description: Attribute
      properties:
        name:
          type: string
          description: name of the attribute
          example: version
        value:
          type: array
          description: values of the attribute
          example:
            - "8.8"
            - "24.1"
          items:
            type: string
        type:
          type: string
          description: type of the attribute
          example: string
          enum:
            - string
    FilterAttribute:
      type: object
      properties:
        name:
          type: string
          description: name of the attribute
          example: version
        operator:
          type: string
          description: "Logic operator. Must be one of [in,or,any] or one of [all,and]"
          example: in
          enum:
            - in
            - or
            - any
            - all
            - and
        value:
          type: array
          description: values of the attribute
          example:
            - "8.8"
            - "24.1"
          items:
            type: string
        type:
          type: string
          description: type of the attribute
          example: string
          enum:
            - string
    Filters:
      type: object
      properties:
        operator:
          type: string
          description: "query operator should be [in,or,any]"
          example: in
        name:
          type: string
          description: name of the attribute
          example: version
        value:
          type: array
          description: value of the attribute
          example:
            - "8.8"
            - "24.1"
          items:
            type: string
        type:
          type: string
          description: type of the attribute
          example: string
          enum:
            - string
    FiltersArray:
      type: array
      items:
        $ref: "#/components/schemas/Filters"
    QueryChunksRequest:
      type: object
      properties:
        limit:
          type: integer
          description: Maximum number of chunks to retrieve.
          example: 5
        maxDistance:
          type: number
          description: Maximum distance for retrieved chunks.
          example: 0.3
        retrieveAttributes:
          type: array
          description: List of attribute names to retrieve.
          example:
            - version
            - category
          items:
            type: string
        filters:
          type: object
          properties:
            query:
              type: string
              description: The question or query string.
              example: What is a report definition?
            attributes:
              type: array
              items:
                $ref: "#/components/schemas/FilterAttribute"
    QueryChunksResponse:
      type: object
      properties:
        content:
          type: string
          description: The content of the chunk.
          example:
            "A report definition is a tool used in database interactions, specifically\
            \ for retrieving required details or information based on certain conditions."
        documentID:
          type: string
          description: The identifier of the document the chunk belongs to.
          example: DOC-1
        distance:
          type: number
          description: "The result of the similarity search in the range [0, 1]."
          example: 0.08
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
    QueryDocumentsRequest:
      type: object
      properties:
        limit:
          type: integer
          description: Maximum number of chunks to inspect.
          example: 5
        maxDistance:
          type: number
          description: Maximum distance for retrieved chunks.
          example: 0.3
        retrieveAttributes:
          type: array
          description: List of attribute names to retrieve.
          example:
            - version
            - category
          items:
            type: string
        filters:
          type: object
          properties:
            query:
              type: string
              description: The question or query string.
              example: What is a report definition?
            attributes:
              type: array
              items:
                $ref: "#/components/schemas/FilterAttribute"
        enableSecondScan:
          type: boolean
          description: >
            When true, if the initial scan returns fewer documents than requested
            (due to multi-chunk deduplication), a second scan is performed using
            the actual maximum chunks-per-document as the CTE multiplier. This
            improves result completeness at the cost of an additional query.
          example: false
    QueryDocumentsResponse:
      type: object
      properties:
        documentID:
          type: string
          description: The identifier of the document the chunk belongs to.
          example: DOC-1
        distance:
          type: number
          description: "The result of the similarity search in the range [0, 1]."
          example: 0.08
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
    DeletedDocuments:
      type: object
      properties:
        deletedDocuments:
          type: integer
          description: Number of deleted documents
          example: 1
    RetrieveAttributesRequest:
      type: object
      properties:
        retrieveAttributes:
          type: array
          description: List of attribute names to retrieve.
          example:
            - version
            - category
          items:
            type: string
    AttributesGroupCreationRequest:
      type: object
      properties:
        description:
          type: string
          description: The group description
          example: Group one
        attributes:
          type: array
          description: List of attribute values to add in vector store.
          example:
            - version
            - category
          items:
            type: string
    AttributesGroupCreationResponse:
      type: object
      properties:
        groupID:
          type: string
          example: 82ed8336-67ad-4449-9f30-772359c90dc8
        description:
          type: string
          description: The group description
          example: Group one
        attributes:
          type: array
          description: List of attribute values to add in vector store.
          example:
            - version
            - category
          items:
            type: string
    AgAttributesList:
      type: object
      properties:
        attributes:
          type: array
          description: List of attribute values to add in vector store.
          example:
            - version
            - category
          items:
            type: string
    AttributesGroupsList:
      type: array
      items:
        type: object
        properties:
          groupID:
            type: string
            example: 82ed8336-67ad-4449-9f30-772359c90dc8
          description:
            type: string
            example: Group one
    AttributesGroup:
      type: object
      properties:
        groupID:
          type: string
          example: 82ed8336-67ad-4449-9f30-772359c90dc8
        description:
          type: string
          example: Group one
        attributes:
          $ref: "#/components/schemas/AgAttributesList"
    PutDocumentFileRequest:
      title: Put document file request
      type: object
      properties:
        documentID:
          description: The document identifier.
          type: string
          example: "Document-1"
        documentFile:
          description: The document file
          type: string
          format: binary
        documentAttributes:
          description: Array of attributes for the document (JSON, name/type/values)
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
          example:
            - name: "version"
              type: "string"
              value: ["8.8", "24.1"]
            - name: "region"
              type: "string"
              value: ["US"]
        documentMetadata:
          allOf:
            - $ref: "#/components/schemas/FileMetadata"
          example:
            embeddingAttributes: ["version", "region"]
            enableSmartAttribution: true
            embedSmartAttributes: false
            enableOCR: true
      required:
        - documentID
        - documentAttributes
        - documentFile
    PutDocumentPlainTextRequest:
      title: Put document document plaintext file request
      type: object
      properties:
        documentID:
          description: The document identifier.
          type: string
          example: "Example"
        documentAttributes:
          description: Array of attributes for the document (name/type/values)
          type: array
          items:
            $ref: "#/components/schemas/Attribute"
        documentContent:
          description: The document content. Plain text.
          type: string
          example: "Content of the document"
        documentMetadata:
          $ref: "#/components/schemas/FileMetadata"
      required:
        - documentID
        - documentAttributes
        - documentContent
      example:
        documentID: "Example"
        documentAttributes:
          - name: "version"
            type: "string"
            value: ["8.8", "24.1"]
          - name: "region"
            type: "string"
            value: ["US"]
        documentContent: "This is the plain text content of the document."
        documentMetadata:
          embeddingAttributes: ["version", "region"]
          enableSmartAttribution: true
          embedSmartAttributes: false
          enableOCR: false
    DocumentDeleteByIdRequest:
      type: object
      properties:
        id:
          type: string
          description: Document id
          example: DOC-1
    Metadata:
      description: >
        Metadata. Configures the chunking / embedding behavior.
      type: object
      properties:
        embeddingAttributes:
          $ref: "#/components/schemas/MetadataEmbeddingAttributes"
        extraAttributesKinds:
          type: array
          description: >
            List of extra attribute kinds to include. Valid values are `auto-resolved`, `index` and `static`.
          items:
            type: string
            enum:
              - auto-resolved
              - index
              - static

    FileMetadata:
      description: >
        Metadata for file-based document uploads. Extends base Metadata with
        Smart Chunking attribution options.
      allOf:
        - $ref: "#/components/schemas/Metadata"
        - type: object
          properties:
            enableSmartAttribution:
              type: boolean
              nullable: true
              description: >
                Enable smart attribution extraction (regions, dates, versions) per chunk
                during Smart Chunking processing.
                Optional. When not provided or null, the service decides automatically
                and this behavior may change between releases. Set explicitly to true
                or false to guarantee consistent behavior.
            embedSmartAttributes:
              type: boolean
              nullable: true
              description: >
                When true and enableSmartAttribution is also true, automatically merges
                auto-resolved attribute names into embeddingAttributes sent to Vector Store
                for injection. Ignored when enableSmartAttribution is false.
                Optional. When not provided or null, the service decides automatically
                and this behavior may change between releases. Set explicitly to true
                or false to guarantee consistent behavior.
            enableOCR:
              type: boolean
              nullable: true
              description: >
                Enable OCR (Optical Character Recognition) for text extraction from images.
                Extracts text from scanned PDFs and images within documents.
                Recommended for scanned documents or image-heavy PDFs.
                When false, only extracts native text from PDFs.
                Optional. When not provided or null, the service decides automatically
                and this behavior may change between releases. Set explicitly to true
                or false to guarantee consistent behavior.
            excludeSmartAttributes:
              type: array
              items:
                type: string
              nullable: true
              description: >
                List of smart attribute names to exclude from extraction during Smart Chunking.
                When an attribute name is in this list, the chunking service will skip its extraction.
                This is useful when the attribute value is already known and provided via documentAttributes.
              example: ["title"]

    MetadataEmbeddingAttributes:
      type: array
      items:
        type: string
      description: >
        List of attribute names whose values should added as concatenated content during embedding creation.
        If not provided only original content will be used for embedding.
        If value can not be found in 'attributes' the parameter will be ignored.
      example:
        - version
        - category
    FindDocumentsRequest:
      type: object
      properties:
        fields:
          type: array
          description: >
            List of fields to retrieve. Available fields are:
            - `documentID`: The unique identifier of the document.
            - `ingestionStatus`: The ingestion status of the document.
            - `ingestionTime`: Timestamp of the beginning of the ingestion.
            - `updateTime`: Timestamp of the last successful ingestion.
            - `errorMessage`: Error message associated with the document.
            - `chunkStatus`: Count of document chunks by status.
          items:
            type: string
          example: ["documentID", "ingestionStatus", "ingestionTime","documentAttributes"]
        filter:
          $ref: "#/components/schemas/FindDocumentsFilter"
    FindDocumentsFilter:
      type: object
      properties:
        attributes:
          $ref: "#/components/schemas/FindDocumentsAttributesFilter"
        status:
          type: string
          description: Status of the document.
          example: "Completed"
    FindDocumentsAttributesFilter:
      type: object
      required:
        - operator
        - items
      properties:
        operator:
          type: string
          description: Logical operator for attributes.
          example: "AND"
        items:
          type: array
          items:
            $ref: "#/components/schemas/FindDocumentsAttributeItem"
    FindDocumentsAttributeItem:
      type: object
      required:
        - operator
        - name
        - values
      properties:
        operator:
          type: string
          description: Logical operator for the attribute.
          example: "or"
        name:
          type: string
          description: Name of the attribute.
          example: "version"
        values:
          type: array
          description: Values of the attribute.
          items:
            type: string
          example: ["8.8", "24.1"]
        type:
          type: string
          description: Type of the attribute.
          example: "string"
          enum:
            - string
    FindDocumentsResponse:
      type: object
      properties:
        documents:
          type: array
          description: List of documents matching the filters.
          items:
            type: object
            properties:
              documentID:
                type: string
                description: The unique identifier of the document.
                example: "DOC_ID"
              ingestionStatus:
                type: string
                description: The ingestion status of the document.
                example: "Completed"
              errorMessage:
                type: string
                description: Error message associated with the document.
                example: "No errors"
              ingestionTime:
                type: string
                description: Timestamp of the beginning of the ingestion.
                example: "2023-10-01T12:00:00Z"
              updateTime:
                type: string
                description: Timestamp of the last successful ingestion.
                example: "2023-10-01T12:00:00Z"
              chunkStatus:
                type: object
                additionalProperties:
                  type: integer
                  description: Map of chunk statuses.
              documentAttributes:
                  type: array
                  description: Array of attributes for the document (name/type/values)
                  items:
                  $ref: "#/components/schemas/AttributeV2"
        pagination:
          $ref: "#/components/schemas/Pagination"
    AttributeV2:
      type: object
      description: Attribute V2
      properties:
        name:
          type: string
          description: name of the attribute
          example: version
        values:
          type: array
          description: values of the attribute
          example:
            - "8.8"
            - "24.1"
          items:
            type: string
        type:
          type: string
          description: type of the attribute
          example: string
          enum:
            - string
    FileSubmissionResponse:
      type: object
      description: Response returned when a file or text is submitted for async processing via Smart Chunking.
      properties:
        documentID:
          type: string
          description: The document identifier provided in the request.
          example: "my-document-id"
        status:
          type: string
          description: Current status of the document.
          enum: [IN_PROGRESS]
          example: "IN_PROGRESS"

    TimeoutError:
      type: object
      description: Gateway Timeout - Operation timeout after max retries exceeded
      properties:
        code:
          type: string
          description: HTTP status code
          example: "504"
        message:
          type: string
          description: Detailed timeout error message
          example: "LLM Response timeout. Failed to complete embedding operation during 3000 milliseconds. Max retries (2) reached"

  securitySchemes:
    Bearer:
      type: apiKey
      description:
        "Enter the token with the `Bearer: ` prefix, e.g. \"Bearer abcde12345\"\
        ."
      name: Authorization
      in: header

  headers:
    X-Genai-Vectorstore-Db-Query-Time-Ms:
      description: >
        The time taken to query the database in milliseconds.
        This header is returned only if the request was successful and had DB queries.
      schema:
        type: integer
        example: 123
    X-Genai-Vectorstore-Model-Id:
      description: >
        The model ID used for the embedding.
        This header is returned only if the request was successful and had embedder invocations.
      schema:
        type: string
        example: openai-text-embedding-ada-002
    X-Genai-Vectorstore-Model-Version:
      description: >
        The model version used for the embedding.
        This header is returned only if the request was successful and had embedder invocations.
      schema:
        type: string
        example: "2"
    X-Genai-Vectorstore-Embedding-Time-Ms:
      description: >
        The time taken to create the embedding in milliseconds.
        This header is returned only if the request was successful and had embedder invocations.
      schema:
        type: integer
        example: 123
    X-Genai-Vectorstore-Embedding-Calls-Count:
      description: >
        The number of embedding calls made during the request.
        This header is returned only if the request was successful and had embedder invocations.
      schema:
        type: integer
        example: 1
    X-Genai-Vectorstore-Processing-Duration-Ms:
      description: >
        The total Vector Store processing overhead in milliseconds: sum of internal VS overhead
        and embedding net overhead (SAX token acquisition + network latency to Gateway).
        Together with X-Genai-Gateway-Model-Call-Duration-Ms, X-Genai-Gateway-Processing-Duration-Ms,
        and X-Genai-Vectorstore-Db-Query-Time-Ms it adds up to X-Genai-Vectorstore-Request-Duration-Ms.
      schema:
        type: integer
        example: 45
    X-Genai-Vectorstore-Overhead-Ms:
      description: >
        Internal Vector Store processing overhead in milliseconds
        (RequestDuration - DbQueryTime - EmbeddingTime). Excludes DB and embedding call time.
      schema:
        type: integer
        example: 6
    X-Genai-Vectorstore-Embedding-Net-Overhead-Ms:
      description: >
        Overhead of embedding call excluding Gateway processing time, in milliseconds
        (EmbeddingTime - GatewayResponseTime). Includes SAX token acquisition and network latency.
        Zero for requests without embeddings.
      schema:
        type: integer
        example: 39
    X-Genai-Vectorstore-Request-Duration-Ms:
      description: >
        The total time taken to process the request in milliseconds.
        This header is returned only if the request was successful.
      schema:
        type: integer
        example: 123
    X-Genai-Vectorstore-Response-Returned-Items-Count:
      description: >
        The number of items returned in the response.
        This header is returned only if the request was successful and had some items returned.
      schema:
        type: integer
        example: 10
    X-Genai-Vectorstore-Embedding-Retry-Count:
        description: >
            The number of retries performed for the embedding request.
            This header is returned only if the request was successful and had some retries.
        schema:
            type: integer
            example: 2
    X-Genai-Gateway-Response-Time-Ms:
      description: >
        The time taken to query Genai-Gateway Service in milliseconds.
        This header is returned only if the request was successful.
      schema:
        type: integer
        example: 123
    X-Genai-Gateway-Input-Tokens:
        description: >
            The number of input tokens used in the request according to Genai-Gateway Service.
            This header is returned only if the request was successful and had some input tokens.
        schema:
            type: integer
            example: 1000
    X-Genai-Gateway-Output-Tokens:
        description: >
            The number of output tokens generated in the response according to Genai-Gateway Service.
            This header is returned only if the request was successful and had some output tokens.
        schema:
            type: integer
            example: 200
    X-Genai-Gateway-Tokens-Per-Second:
        description: >
            The number of tokens processed per second according to Genai-Gateway Service.
            This header is returned only if the request was successful and had some tokens processed.
        schema:
            type: integer
            example: 500
    X-Genai-Gateway-Retry-Count:
        description: >
            The number of retries performed by Genai-Gateway Service for the request.
            This header is returned only if the request was successful and had some retries.
        schema:
            type: integer
            example: 2
    X-Genai-Gateway-Model-Id:
        description: >
            The model ID used for the request by Genai-Gateway Service.
            This header is returned only if the request was successful and had some model ID.
        schema:
            type: string
            example: text-embedding-ada-002
    X-Genai-Gateway-Region:
        description: >
            The region used for the request by Genai-Gateway Service.
            This header is returned only if the request was successful.
        schema:
            type: string
            example: us-east-1
    X-Genai-Vectorstore-Vectors-Count:
        description: >
            The total number of vectors in the collection.
            This header is returned for successful requests (200, 201, 202).
            This information may be approximate and not exact count since is updated asynchronously.
        schema:
            type: integer
            example: 100
    X-Genai-Vectorstore-Documents-Count:
        description: >
            The total number of documents in the collection.
            This header is returned for successful requests (200, 201, 202).
            This information may be approximate and not exact count since is updated asynchronously.
        schema:
            type: integer
            example: 25
