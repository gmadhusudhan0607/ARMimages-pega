          limits:
            cpu: 500m
            memory: 400Mi
      # Enable horizontal pod autoscaling based on cpu utilization
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 2
        metrics:
          - type: Resource
            resource:
              name: cpu
              target:
