# NOTE: deprecationDate must follow the format YYYY-MM-DD (ISO 8601).
# This is required for compatibility with Go's time.Parse("2006-01-02")
# Metadata Key, e.g. 'claude-3-haiku' reflects: <name> from the mapping (gcp), <ModelMapping> (aws), <model-name>-<model-version> (azure)
#modelID is provided only for azure and gcp models, for aws it's being populated from the mapping

claude-3-haiku:
  modelName: claude-3-haiku
  version: v1
  modelLabel: Claude 3 Haiku
  type: chat_completion
  modelCapabilities:
    features:
      - streaming
      - functionCalling
      - jsonMode
    inputModalities:
      - text
      - image
    outputModalities:
      - text
      - chat
    mimeTypes:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - application/pdf
      - application/docx
      - text/csv
      - application/doc
      - application/xls
      - application/xlsx
      - text/html
      - text/plain
      - text/markdown
  parameters:
    maxInputTokens:
      title: Max Input Tokens
      description: Maximum number of tokens (words or subwords) for input
      type: integer
      maximum: 200000
      required: false
    max_tokens:
      title: Max Output Tokens
      description: Maximum number of tokens to generate
      type: integer
      default: 4096
      maximum: 4096
      required: false
    temperature:
      title: Temperature
      description: Controls randomness of the generated output
      type: float
      default: 0.7
      maximum: 1.0
      minimum: 0.0
      required: false
    topP:
      title: Top P
      description: Nucleus sampling parameter controlling diversity of the output.
      type: float
      default: 1.0
      minimum: 0.0
      maximum: 1.0
      required: false
    topK:
      title: Top K
      description: Tok K parameter controlling predictability/diversity of output.
      type: integer
      default: null
      minimum: 1
      maximum: 50
      required: false
    stopSequences:
      title: Stop Sequences
      description: Allows to define sequences causing model to terminate generation
      type: string
      default: null
      required: false
