# NOTE: The 'deprecationDate' and 'lifecycle' fields in this spec file are for REFERENCE ONLY.
# They do NOT flow to the API response at runtime. The runtime source of truth for model
# deprecation/lifecycle data is the Helm model-metadata.yaml ConfigMap, which populates
# the DeprecationInfo and Lifecycle fields in the API response via enrichWithMetadata().
# See: distribution/genai-hub-service-helm/src/main/helm/templates/model-metadata.yaml
infrastructure: aws
provider: bedrock
creator: anthropic
metadata:
  description: "Anthropic Claude models on AWS Bedrock"
  documentation: "https://docs.aws.amazon.com/bedrock/latest/userguide/model-ids-arns.html"
models:
  - name: claude-3-haiku
    version: v1
    label: Claude 3 Haiku
    id: anthropic.claude-3-haiku-20240307-v1:0
    functionalCapabilities: ["chat_completion"]
    endpoints:
      - path: /converse
      - path: /converse-stream
      - path: /invoke
      - path: /invoke-with-response-stream
    capabilities:
      features: [streaming, functionCalling, jsonMode]
      inputModalities: [text, image]
      outputModalities: [text, chat]
      mimeTypes: [image/jpeg, image/png, image/gif, image/webp, application/pdf, application/docx, text/csv, application/doc, application/xls, application/xlsx, text/html, text/plain, text/markdown]
    deployment:
      region: us-east-1
      instanceType: bedrock-runtime
    parameters:
      maxInputTokens:
        title: Max Input Tokens
        description: Maximum number of tokens (words or subwords) for input
        type: integer
        maximum: 200000
        required: false
      maxOutputTokens:
        title: Max Output Tokens
        description: Maximum number of tokens to generate
        type: integer
        default: 4096
        maximum: 4096
        required: false
      temperature:
        title: Temperature
        description: Controls randomness of the generated output
        type: float
        default: 0.7
        maximum: 1.0
        minimum: 0.0
        required: false
      topP:
        title: Top P
        description: Nucleus sampling parameter controlling diversity of the output.
        type: float
        default: 1.0
        minimum: 0.0
        maximum: 1.0
        required: false
      topK:
        title: Top K
        description: Tok K parameter controlling predictability/diversity of output.
        type: integer
        default: null
        minimum: 1
        maximum: 50
        required: false
      stopSequences:
        title: Stop Sequences
        description: Allows to define sequences causing model to terminate generation
        type: array
        items:
          type: string
        default: null
        required: false
