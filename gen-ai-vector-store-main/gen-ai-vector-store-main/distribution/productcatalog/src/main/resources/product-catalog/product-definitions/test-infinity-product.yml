id: GenAIVectorStoreTestInfinity
name: GenAIVectorStoreTestInfinity
version: @version@
description: Deploys Test Infinity Isolation for GenAIVectorStore

dependencies:
  {{>dependencies.yml}}

mappings:
  services_versions:
    {{>services_versions.yml}}

prompts:
  - name: Owner
    description: Owner of the deployment (for tagging purpose)
    constraints:
      required: true
    uicontrols:
      type: text
  - name: Name
    description: Environment name
    dependsOn: prompts.Owner
    defaultValue: !e ('genai-vector-store-test-infinity--' + prompts.Owner.toLowerCase() + '-' + fn.randomString().length(6).generate().toLowerCase())
    constraints:
      required: true
      minLength: 10
    uicontrols:
      type: text
  - name: ClusterGUID
    description: The guid of the CloudK cluster in which TestInfinity product will be deployed
    constraints:
      allowedPattern: (\w{8}-\w{4}-\w{4}-\w{4}-\w{12})
      required: true
    uicontrols:
      type: text
  - name: MaxStorageSize
    description: MaxStorageSize
    defaultValue: "5GB"
    constraints:
      required: true
    uicontrols:
      type: text
  - name: GenAIVectorStoreNamespace
    description: Namespace of GenAIVectorStore Ops service that will be used for Isolation registration
    defaultValue: "genai-vector-store"
    constraints:
      required: true
      immutable: true
    uicontrols:
      type: text
  - name: IsolationID
    description: The guid of the test product mimicking CloudK env
    constraints:
      allowedPattern: (\w{8}-\w{4}-\w{4}-\w{4}-\w{12})
    uicontrols:
      type: text


node:
  path: !e '"/backing-services/${fn.generateGUID()}"'
  labels:
    name: !e fn.select("", prompts.Name)
    type: GenAIVectorStoreTestInfinity
    clusterguid: !e fn.select("", prompts.ClusterGUID)
    owner: "JarvisTeam"
    accountid: !e cmdbService.cluster(fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))).get('AccountID')
    region: !e cmdbService.cluster(fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))).get('Region')
    provider: !e cmdbService.cluster(fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))).labels().get('provider')
    pega-service-id: @pegaServiceId@
    pega-service-name: @pegaServiceName@
    pega-product-id: PRD-7724
    environmenttype: "Dev"
  services:
    - name: InfinityIsolation
      version: !e fn.lookup('services_versions', 'InfinityIsolation')
      parameters:
        - name: IsolationID
          value: !e prompts.IsolationID
          upgradeValue: !e cmdbService.findInput('IsolationID', 'InfinityIsolation')
    - name: GenAIVectorStoreIsolation
      version: @version@
      condition: !e (cp.getStageName() in ["development", "integration"])
      parameters:
        - name: ClusterGUID
          value:        !e fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))
          upgradeValue: !e fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID'))
        - name: IsolationID
          value: ""
          upgradeValue: !e cmdbService.find('IsolationID', 'InfinityIsolation')
        - name: MaxStorageSize
          value:        !e fn.select(prompts.MaxStorageSize, cmdbService.findInput('MaxStorageSize'))
          upgradeValue: !e fn.select(prompts.MaxStorageSize, cmdbService.findInput('MaxStorageSize'))
        - name: OpsServiceEndpoint
          value:         "!e
            cmdbService.findBackingServiceInClusterWithNamespace(
                fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID')),
                fn.select(prompts.GenAIVectorStoreNamespace, cmdbService.findInput('GenAIVectorStoreNamespace')),
                'type=GenAIVectorStore'
            ).get('OpsServiceEndpointExternal')"
          upgradeValue: "!e
            cmdbService.findBackingServiceInClusterWithNamespace(
                fn.select(prompts.ClusterGUID, cmdbService.findInput('ClusterGUID')),
                fn.select(prompts.GenAIVectorStoreNamespace, cmdbService.findInput('GenAIVectorStoreNamespace')),
                'type=GenAIVectorStore'
            ).get('OpsServiceEndpointExternal')"
    - name: ServiceAuthenticationClientService
      version: !e fn.lookup('services_versions', 'ServiceAuthenticationClientService')
      parameters:
        - name: Owner
          value: !e prompts.Owner
        - name: ClusterGUID
          value: !e prompts.ClusterGUID
        - name: ServiceType
          value: backing-services
        - name: AllowedScopes
          value: "genai-vector-store:read genai-vector-store:write"
  nodes: []
  