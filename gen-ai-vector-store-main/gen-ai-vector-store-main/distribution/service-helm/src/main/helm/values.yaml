        - name: SAX_JWKS_ENDPOINT
          value: "{{ .Values.SaxOpsJWKSEndpoint }}"
        - name: SAX_AUDIENCE
          value: "{{ .Values.SaxOpsAudience }}"
        - name: SAX_CLIENT_SECRET
