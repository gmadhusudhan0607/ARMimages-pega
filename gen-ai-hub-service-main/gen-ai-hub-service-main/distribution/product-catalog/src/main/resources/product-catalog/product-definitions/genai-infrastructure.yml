id: GenAIInfrastructure
name: GenAI Infrastructure
version: @version@
description: GenAI Infrastructure Configuration Product

mappings:
  services_version:
    {{>services_version.yml}}

  aws_llm_model_region:
    {{>aws_llm_model_region.yml}}

prompts:
  - name: Owner
    description: Owner of the deployment (for tagging purpose)
    constraints:
      required: true
    uicontrols:
      type: text
  - name: Region
    description: Reference region for the GenAI Infrastructure
    constraints:
      required: true
    uicontrols:
      type: text
  - name: AccountID
    description: Account to provision GenAI Infrastructure
    dependsOn: cp.stageName
    constraints:
      required: true
    uicontrols:
      type: text
  - name: EnableManagedClaude3Haiku
    description: Enable model Claude 3 Haiku automatically on this infrastructure region
    defaultValue: true
    uicontrols:
      type: bool
  - name: EnableManagedTitanTextEmbeddingsV2
    description: Enable model Titan Text Embeddings V2 automatically on this infrastructure region
    defaultValue: true
    uicontrols:
      type: bool
  - name: EnableManagedClaude37Sonnet
    description: Enable model Claude 3.7 Sonnet automatically on this infrastructure region
    defaultValue: true
    uicontrols:
      type: bool

node:
  path: !e '"/controlplane-services/${fn.generateGUID()}"'
  labels:
    type: GenAI Infrastructure Product
    name: 'genai-infrastruture'
    owner: !e fn.select("", prompts.Owner)
    accountid: !e fn.select("", prompts.AccountID)
    region: !e fn.select("", prompts.Region)
    provider: aws
    pega-service-id: PRD-7655
    pega-service-name: GenAI Infrastructure Product
  services:
    - name: SaxIamOidcProvider
      namespace: default
      version: @version@


    - name: GenAIAWSBedrockInfra
      namespace: managed-claude-3-haiku-cris
      version: @version@
      condition: !e prompts.EnableManagedClaude3Haiku
      parameters:
        - name: ModelMapping
          value: claude-3-haiku
        - name: ModelID
          value: anthropic.claude-3-haiku-20240307-v1:0
        - name: Region
          value: !e prompts.Region
          upgradeValue: !e cmdbService.findInput("Region")
        - name: AccountID
          value: !e prompts.AccountID
          upgradeValue: !e cmdbService.findInput("AccountID")
        - name: TargetApi
          value: converse
        - name: UseRegionalInferenceProfile
          value: true
        - name: InferenceProfilePrefix
          value: !e "fn.lookup('aws_llm_model_region', 'anthropic.claude-3-haiku-20240307-v1:0', prompts.Region, 'inference')"
          upgradeValue: !e "fn.lookup('aws_llm_model_region', 'anthropic.claude-3-haiku-20240307-v1:0', cmdbService.findInput('Region', 'SaxIamOidcProvider'), 'inference')"
        - name: InferenceRegion
          value: !e prompts.Region
          upgradeValue: !e "fn.lookup('aws_llm_model_region', 'anthropic.claude-3-haiku-20240307-v1:0', cmdbService.findInput('Region', 'SaxIamOidcProvider'), 'inferenceRegion')"
        - name: PublishGlobalSecret
          value: false
          upgradeValue: false
        - name: Owner
          value: !e prompts.Owner
          upgradeValue: !e cmdbService.findInput("Owner")
        - name: Inactive
          value: false

    - name: GenAIAWSBedrockInfra
      namespace: managed-claude-3-haiku-cris-stream
      version: @version@
      parameters:
        - name: ModelMapping
          value: claude-3-haiku
        - name: ModelID
          value: anthropic.claude-3-haiku-20240307-v1:0
        - name: Region
